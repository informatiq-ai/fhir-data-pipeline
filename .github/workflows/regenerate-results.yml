name: Regenerate Pipeline Results

on:
  push:
    branches: [main]
    paths:
      - "ingestion/**"
      - "transforms/**"
      - "schema/**"
      - "data/synthetic/**"
      - "tests/**"
      - "run_pipeline.py"
  workflow_dispatch:

jobs:
  regenerate:
    name: Regenerate PIPELINE_RESULTS.md
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install hl7apy fhir.resources pytest

      - name: Run full pipeline and write results
        run: python run_pipeline.py

      - name: Commit updated PIPELINE_RESULTS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PIPELINE_RESULTS.md
          git diff --staged --quiet || git commit -m "chore: regenerate PIPELINE_RESULTS.md [skip ci]"
          git push

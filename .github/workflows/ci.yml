name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests and pipeline — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install hl7apy fhir.resources pytest

      - name: Run test suite
        run: python run_pipeline.py --tests-only

      - name: Run full pipeline (no write)
        run: python run_pipeline.py --no-write

      - name: Upload pipeline results
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: PIPELINE_RESULTS.md
